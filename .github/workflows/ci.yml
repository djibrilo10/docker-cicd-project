name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v3

    - name: Build Docker
      run: docker build -t mon-app .

    - name: Lancer le conteneur
      run: docker run -d -p 3000:3000 mon-app

    - name: Test HTTP
      run: curl http://localhost:3000