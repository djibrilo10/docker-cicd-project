name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t mon-app .

    - name: Run container
      run: docker run -d -p 3000:3000 --name test-container mon-app

    - name: Wait for app
      run: sleep 5

    - name: Test app
      run: curl http://localhost:3000